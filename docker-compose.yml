services:
  backend:
    image: ghcr.io/${GITHUB_OWNER:-jwposton}/ff3analytics-backend:${FF3ANALYTICS_TAG:-latest}
    container_name: ff3analytics-backend
    build: ./backend
    restart: unless-stopped
    ports:
      - "18001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL:-}
      FIREFLY_API_TOKEN: ${FIREFLY_API_TOKEN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      FF3ANALYTICS_DATA_DIR: /data
    volumes:
      # Persistent SQLite sidecar (AI cache + audit log)
      - ff3analytics-data:/data

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-jwposton}/ff3analytics-frontend:${FF3ANALYTICS_TAG:-latest}
    container_name: ff3analytics-frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  ff3analytics-data:
