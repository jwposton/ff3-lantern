services:
  backend:
    image: ff3analytics-backend
    container_name: ff3analytics-backend
    build: ./backend
    restart: unless-stopped
    ports:
      - "18001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL:-}
      FIREFLY_API_TOKEN: ${FIREFLY_API_TOKEN:-}

  frontend:
    image: ff3analytics-frontend
    container_name: ff3analytics-frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:5173"
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: http://backend:8000
