services:
  backend:
    image: ghcr.io/${GITHUB_OWNER:-jwposton}/ff3-lantern-backend:${FF3LANTERN_TAG:-latest}
    container_name: ff3-lantern-backend
    build: ./backend
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "18001:8000"
    env_file:
      - path: .env
        required: false
    environment:
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL:-}
      FIREFLY_API_TOKEN: ${FIREFLY_API_TOKEN:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    volumes:
      # Host path: FF3LANTERN_DATA_PATH → /data (image sets FF3LANTERN_DATA_DIR=/data).
      - ${FF3LANTERN_DATA_PATH:-./data}:/data

  frontend:
    image: ghcr.io/${GITHUB_OWNER:-jwposton}/ff3-lantern-frontend:${FF3LANTERN_TAG:-latest}
    container_name: ff3-lantern-frontend
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      backend:
        condition: service_healthy
