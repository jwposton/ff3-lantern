name: Publish Docker images

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Pytest
        run: cd backend && pytest -q

  build-backend:
    runs-on: ${{ matrix.runner }}
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve per-arch tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ff3analytics-backend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=backend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=backend-${{ matrix.arch }}

  merge-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge backend multi-arch manifest
        run: |
          owner="${{ github.repository_owner }}"
          version="${{ steps.version.outputs.value }}"
          docker buildx imagetools create \
            -t "ghcr.io/${owner}/ff3analytics-backend:${version}" \
            -t "ghcr.io/${owner}/ff3analytics-backend:latest" \
            "ghcr.io/${owner}/ff3analytics-backend:${version}-amd64" \
            "ghcr.io/${owner}/ff3analytics-backend:${version}-arm64"

  build-frontend:
    runs-on: ${{ matrix.runner }}
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve per-arch tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest-${{ matrix.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ff3analytics-frontend:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=frontend-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=frontend-${{ matrix.arch }}

  merge-frontend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge frontend multi-arch manifest
        run: |
          owner="${{ github.repository_owner }}"
          version="${{ steps.version.outputs.value }}"
          docker buildx imagetools create \
            -t "ghcr.io/${owner}/ff3analytics-frontend:${version}" \
            -t "ghcr.io/${owner}/ff3analytics-frontend:latest" \
            "ghcr.io/${owner}/ff3analytics-frontend:${version}-amd64" \
            "ghcr.io/${owner}/ff3analytics-frontend:${version}-arm64"
