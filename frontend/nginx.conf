# Docker embeds DNS at 127.0.0.11. Use a variable in proxy_pass so nginx
# re-resolves backend on each request (avoids stale IP after container recreate).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /health {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
